<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="heart-container"></div>

    <!-- Start Page -->
    <div id="start-page" class="page active">
        <h1>Our Love Game 💖</h1>
        <button id="start-btn">Start</button>
    </div>

    <!-- Stage 1: Adventure Path -->
    <div id="adventure-page" class="page">
        <h2>Where should we go on our next virtual date?</h2>
        <div class="options">
            <button class="option-btn" data-path="stars">Stargazing 🌌</button>
            <button class="option-btn" data-path="picnic">Picnic 🧺</button>
            <button class="option-btn" data-path="movie">Movie Night 🎬</button>
        </div>
    </div>

    <!-- Stage 2: Mini Challenge -->
    <div id="challenge-page" class="page">
        <h2 id="challenge-title"></h2>
        <div id="challenge-area"></div>
        <button id="challenge-next" style="display:none;">Next</button>
    </div>

    <!-- Miss Me Page -->
    <div id="miss-page" class="page">
        <h2>It's late night and u miss me, what do u do?</h2>
        <div class="options">
            <button class="option-btn" data-choice="call">Call me 📞</button>
            <button class="option-btn" data-choice="stubborn">Be stubborn 😏</button>
            <button class="option-btn" data-choice="chats">Read old chats 💌</button>
        </div>
    </div>

    <!-- Result Page -->
    <div id="result-page" class="page">
        <h2 id="result-title"></h2>
        <div id="result-content"></div>
        <button id="restart-btn">Play Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
